<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio Creativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  
    <nav>
        <div class="logo">MC</div>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#galeria">Proyectos</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <header id="inicio" class="hero">
        <div class="hero-content">
            <h1>Explorando el <span class="italic">Arte</span> y el <span class="bold">Diseño</span></h1>
            <p>Diseñadora Gráfica y Artista Multidisciplinaria</p>
            <a href="#galeria" class="btn">Ver mi trabajo</a>
        </div>
    </header>


    <section id="galeria" class="gallery">
        <h2 class="section-title">Portafolio</h2>
        <div class="grid-container">
            <div class="card">
                <img src="identidadvisual.png" alt="Proyecto 1">
                <div class="overlay"><span>Identidad Visual</span></div>
            </div>
            <div class="card tall">
                <img src="cindi.jpg" alt="Proyecto 2">
                <div class="overlay"><span>Fotografía</span></div>
            </div>
            <div class="card">
                <img src="editorial.jpeg" alt="Proyecto 3">
                <div class="overlay"><span>Editorial</span></div>
            </div>
            <div class="card">
                <img src="ilustracion.jpeg"alt="Proyecto 4">
                <div class="overlay"><span>Ilustración</span></div>
            </div>
        </div>
    </section>

    <footer id="contacto">
        <div class="footer-info">
            <h2>CONTACTAME</h2>
            <p>Disponible para colaboraciones creativas.</p>
            <div class="social-links">
                <a href="https://www.instagram.com/marielacruz.dg/">Instagram</a>
                <a href="https://wa.me/50377890178" target="_blank" class="btn-whatsapp">WhatsApp</a>
            </div>
        </div>
    </footer>

</body>
</html>
